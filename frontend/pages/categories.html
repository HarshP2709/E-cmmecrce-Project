<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Categories — ShopVerse</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/products.css"> <!-- Reuse grids -->

    <style>
        .categories-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: var(--space-8) 0;
            text-align: center;
            margin-bottom: var(--space-8);
            position: relative;
            overflow: hidden;
        }

        .categories-title {
            font-size: var(--font-size-3xl);
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: var(--space-3);
        }

        .categories-subtitle {
            color: var(--text-muted);
            font-size: var(--font-size-lg);
            max-width: 600px;
            margin: 0 auto;
        }

        .category-page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--space-6);
            margin-bottom: var(--space-16);
        }

        .category-block {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: var(--space-6);
            text-align: center;
            transition: all var(--transition-base);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-4);
            text-decoration: none;
        }

        .category-block:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--color-primary-light);
        }

        .category-block-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all var(--transition-base);
        }

        .category-block:hover .category-block-icon {
            background: var(--color-primary);
            color: white;
            transform: scale(1.1) rotate(5deg);
        }

        .category-block-name {
            font-weight: 800;
            color: var(--text-primary);
            font-size: var(--font-size-lg);
        }

        .category-block-desc {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>

    <script type="module" src="../assets/js/modules/utils.js"></script>
    <script type="module" src="../assets/js/pages/categories.js" defer></script>
</head>

<body>
    <!-- Page Loader -->
    <div id="page-loader">
        <div class="loader-logo">🛍️ ShopVerse</div>
        <div class="loader-bar"></div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" role="alert"></div>

    <!-- Navbar -->
    <nav class="navbar"></nav>

    <main id="main-content">
        <div class="categories-header reveal">
            <div class="container">
                <h1 class="categories-title">Explore <span style="color:var(--color-primary)">Categories</span></h1>
                <p class="categories-subtitle">Discover millions of products perfectly organized just for you.</p>
            </div>
        </div>

        <div class="container">
            <div class="category-page-grid stagger-children" id="full-categories-grid">
                <!-- Javascript populates here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer"></footer>
</body>

</html>
